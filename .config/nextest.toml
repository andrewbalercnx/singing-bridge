# File: .config/nextest.toml
# Purpose: cargo-nextest configuration — limits concurrency for connection-sensitive tests.
# Last updated: Sprint 28 (2026-05-08) -- local postgres service; ws_accompaniment fully parallel

[profile.default]

# db_pool_allows_concurrent_connections competes with parallel binaries for
# postgres connections; run it alone so the acquire timeout is meaningful.
[[profile.default.overrides]]
filter = 'binary(db_pool)'
test-group = 'serial'

[test-groups]
serial = { max-threads = 1 }

# CI profile: per-test timeout + higher parallelism.
# test-threads=8 on 2-CPU runner: tests finish in ~10 min vs 45 min at default num-cpus=2.
# With the shared template DB (advisory lock in ensure_template_db), concurrent test
# processes don't each re-run migrations — only the first does; others wait then clone.
[profile.ci]
test-threads = 8

[[profile.ci.overrides]]
filter = 'binary(db_pool)'
test-group = 'serial'

# Run the historically flaky / slowest binaries first so failures surface early.
# Priority 100 = first; default = 0; negative = deferred to end.
[[profile.ci.overrides]]
filter = 'binary(ws_accompaniment)'
priority = 100

[[profile.ci.overrides]]
filter = 'binary(http_signup)'
priority = 90

[[profile.ci.overrides]]
filter = 'binary(cleanup)'
priority = 80

[[profile.ci.overrides]]
filter = 'binary(db_error_500)'
priority = 70

[[profile.ci.overrides]]
filter = 'all()'
slow-timeout = { period = "60s", terminate-after = 3 }
