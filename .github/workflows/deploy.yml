# File: .github/workflows/deploy.yml
# Purpose: Manual deploy workflow — build container image, push to ACR, update Container App.
# Role: Production release trigger. No automatic push to prod on main.
# Last updated: Sprint 5 (2026-04-18) -- OIDC federation (no long-lived secrets)

name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git ref or tag to deploy (default: HEAD)'
        required: false
        default: ''

permissions:
  id-token: write   # required for OIDC token request
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.sha }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          TAG=$(git rev-parse --short HEAD)
          az acr build \
            --registry sbprodacr \
            --image singing-bridge:$TAG \
            --image singing-bridge:latest \
            .
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Update Container App
        run: |
          az containerapp update \
            --name sb-server \
            --resource-group sb-prod-rg \
            --image sbprodacr.azurecr.io/singing-bridge:$IMAGE_TAG

      - name: Verify health
        run: |
          sleep 10
          FQDN=$(az containerapp show \
            --name sb-server \
            --resource-group sb-prod-rg \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          curl --fail "https://$FQDN/healthz" | grep '"ok"'
