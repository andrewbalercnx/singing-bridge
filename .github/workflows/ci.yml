# File: .github/workflows/ci.yml
# Purpose: Baseline CI that runs on every pull request and push to main.
#   Lints file headers, runs the fast (non-slow) pytest suite, then
#   exercises bootstrap end-to-end via scripts/bootstrap-smoke.py.
#   Ships to both the dev-container and the template repo via the
#   template manifest; downstream projects inherit it on bootstrap.
#
# Last updated: Sprint 2 (2026-04-17) -- add JS test step.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install test deps
        run: python -m pip install --upgrade pip pytest

      - name: Check file headers
        run: python3 scripts/check-headers.py --strict

      - name: pytest (fast suite)
        run: python3 -m pytest -q

      - name: Bootstrap smoke (standard profile)
        if: hashFiles('scripts/bootstrap-smoke.py') != ''
        run: python3 scripts/bootstrap-smoke.py --profile standard

      - name: JS tests (SDP munger + audio predicate)
        if: hashFiles('web/assets/tests/*.test.js') != ''
        run: node --test web/assets/tests/*.test.js
