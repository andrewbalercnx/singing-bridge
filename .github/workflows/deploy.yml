# File: .github/workflows/deploy.yml
# Purpose: Deploy workflow — build container image, push to ACR, update Container App.
# Role: Production release trigger. Runs automatically on every push to main.
# Last updated: Sprint 13 (2026-04-22) -- remove manual approval gate; auto-deploy on push

name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Git ref or tag to deploy (default: HEAD)"
        required: false
        default: ""

permissions:
  id-token: write # required for OIDC token request
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.sha }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push server image to ACR
        run: |
          TAG=$(git rev-parse --short HEAD)
          az acr build \
            --registry sbprodacr \
            --image singing-bridge:$TAG \
            --image singing-bridge:latest \
            --build-arg GIT_SHA=$TAG \
            .
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Build and push sidecar image to ACR
        run: |
          az acr build \
            --registry sbprodacr \
            --image singing-bridge-sidecar:$IMAGE_TAG \
            --image singing-bridge-sidecar:latest \
            sidecar/

      - name: Update Container App
        run: |
          # Export current configuration to preserve multi-container setup & env vars
          az containerapp show --name sb-server --resource-group sb-prod-rg -o yaml > app.yaml

          # Update the image tags for both containers via regex replacement
          sed -i "s|sbprodacr.azurecr.io/singing-bridge:[a-zA-Z0-9_.-]*|sbprodacr.azurecr.io/singing-bridge:$IMAGE_TAG|g" app.yaml
          sed -i "s|sbprodacr.azurecr.io/singing-bridge-sidecar:[a-zA-Z0-9_.-]*|sbprodacr.azurecr.io/singing-bridge-sidecar:$IMAGE_TAG|g" app.yaml

          # Apply the updated configuration
          az containerapp update --name sb-server --resource-group sb-prod-rg --yaml app.yaml

      - name: Verify health
        run: |
          sleep 10
          FQDN=$(az containerapp show \
            --name sb-server \
            --resource-group sb-prod-rg \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          curl --fail "https://$FQDN/healthz" | grep '"ok"'
