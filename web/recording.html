<!doctype html>
<!--
  File: web/recording.html
  Purpose: Student recording access gate — email verification + playback.
  Last updated: Sprint 15 (2026-04-23) -- design system migration
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>singing-bridge — recording</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/assets/theme.css">
</head>
<body class="sb-page">
  <main class="recording-gate">
    <h1>Access your recording</h1>

    <section id="gate-section">
      <p>Enter the email address this link was sent to.</p>
      <form id="gate-form" class="sb-stack">
        <div class="sb-field">
          <label class="sb-label" for="gate-email">Email address</label>
          <input class="sb-input" type="email" id="gate-email" name="email" autocomplete="email" required>
        </div>
        <button class="sb-btn sb-btn--lg" type="submit" id="gate-submit">Access recording</button>
      </form>
      <p id="gate-error" class="error" hidden></p>
    </section>

    <section id="player-section" hidden>
      <p id="player-message">Loading recording…</p>
      <video id="recording-player" controls preload="metadata"></video>
    </section>

    <p id="disabled-notice" class="error" hidden>
      This link has been disabled after too many failed attempts.
      Please contact your teacher to receive a new link.
    </p>

    <script src="/assets/recording-gate.js"></script>
  </main>
</body>
</html>
