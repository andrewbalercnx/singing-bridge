# File: spike/pdf_to_piano_audio/docker-compose.yml
# Purpose: One-command local trial. Run from this directory:
#   docker compose up --build
# then open http://localhost:5173/

services:
  pdf-to-piano-audio:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    image: singing-bridge-pdf-piano:dev
    container_name: singing-bridge-pdf-piano
    ports:
      - "5173:8080"
    environment:
      PIANO_SF2: /opt/sf2/piano.sf2
    volumes:
      - /Users/andrewbale/Downloads/SalamanderGrandPiano-V3+20200602.sf2:/opt/sf2/piano.sf2:ro
    restart: unless-stopped
