# File: .github/workflows/ci.yml
# Purpose: CI + deploy pipeline. On push to main: run tests, then deploy if green.
#   Skips rebuilding server or sidecar image if their source hasn't changed.
#   On pull requests: run tests only. workflow_dispatch triggers full pipeline.
# Last updated: Sprint 27 (2026-05-08) -- nextest + split unit/integration test steps

name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git ref or tag to deploy (default: HEAD)"
        required: false
        default: ""

permissions:
  id-token: write # required for OIDC token request
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install test deps
        run: python -m pip install --upgrade pip pytest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Check file headers
        run: python3 scripts/check-headers.py --strict

      - name: pytest (fast suite)
        run: python3 -m pytest -q

      - name: Bootstrap smoke (standard profile)
        if: hashFiles('scripts/bootstrap-smoke.py') != ''
        run: python3 scripts/bootstrap-smoke.py --profile standard

      - name: JS tests (SDP munger + audio predicate)
        if: hashFiles('web/assets/tests/*.test.js') != ''
        run: node --test web/assets/tests/*.test.js

      - name: Rust unit tests (fast gate)
        run: cargo nextest run -p singing-bridge-server --lib

      - name: Rust integration tests
        env:
          DATABASE_TEST_URL: ${{ secrets.DATABASE_TEST_URL }}
        run: cargo nextest run -p singing-bridge-server --tests

  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.sha }}
          fetch-depth: 2

      - name: Detect changed components
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "SHA=$SHA" >> "$GITHUB_ENV"

          # On workflow_dispatch always build both; otherwise diff against parent
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BUILD_SERVER=true" >> "$GITHUB_ENV"
            echo "BUILD_SIDECAR=true" >> "$GITHUB_ENV"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            echo "Changed files:"
            echo "$CHANGED"

            if echo "$CHANGED" | grep -qv "^sidecar/"; then
              echo "BUILD_SERVER=true" >> "$GITHUB_ENV"
            else
              echo "BUILD_SERVER=false" >> "$GITHUB_ENV"
            fi

            if echo "$CHANGED" | grep -q "^sidecar/"; then
              echo "BUILD_SIDECAR=true" >> "$GITHUB_ENV"
            else
              echo "BUILD_SIDECAR=false" >> "$GITHUB_ENV"
            fi
          fi

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push server image
        if: env.BUILD_SERVER == 'true'
        run: |
          az acr build \
            --registry sbprodacr \
            --image singing-bridge:$SHA \
            --image singing-bridge:latest \
            --build-arg GIT_SHA=$SHA \
            --build-arg WEB_CACHE_BUST=$(date +%s) \
            .

      - name: Build and push sidecar image
        if: env.BUILD_SIDECAR == 'true'
        run: |
          az acr build \
            --registry sbprodacr \
            --image singing-bridge-sidecar:$SHA \
            --image singing-bridge-sidecar:latest \
            sidecar/

      - name: Update Container App
        run: |
          # Use SHA tag for rebuilt images; latest for unchanged ones
          SERVER_TAG=$( [ "$BUILD_SERVER" = "true" ] && echo "$SHA" || echo "latest" )
          SIDECAR_TAG=$( [ "$BUILD_SIDECAR" = "true" ] && echo "$SHA" || echo "latest" )

          az containerapp show --name sb-server --resource-group sb-prod-rg -o yaml > app.yaml
          sed -i "s|sbprodacr.azurecr.io/singing-bridge:[a-zA-Z0-9_.-]*|sbprodacr.azurecr.io/singing-bridge:$SERVER_TAG|g" app.yaml
          sed -i "s|sbprodacr.azurecr.io/singing-bridge-sidecar:[a-zA-Z0-9_.-]*|sbprodacr.azurecr.io/singing-bridge-sidecar:$SIDECAR_TAG|g" app.yaml
          az containerapp update --name sb-server --resource-group sb-prod-rg --yaml app.yaml

      - name: Verify health
        run: |
          # 1. Find the revision just created (latest by createdTime).
          NEW_REV=$(az containerapp revision list \
            --name sb-server --resource-group sb-prod-rg \
            --query "sort_by([?properties.active], &properties.createdTime)[-1].name" \
            --output tsv)
          echo "New revision: $NEW_REV"

          # 2. Poll until Provisioned/Healthy or Failed (up to 3 min, 10 s intervals).
          for i in $(seq 1 18); do
            PSTATE=$(az containerapp revision show \
              --name sb-server --resource-group sb-prod-rg --revision "$NEW_REV" \
              --query "properties.provisioningState" --output tsv)
            HSTATE=$(az containerapp revision show \
              --name sb-server --resource-group sb-prod-rg --revision "$NEW_REV" \
              --query "properties.healthState" --output tsv)
            echo "  attempt $i: provisioningState=$PSTATE healthState=$HSTATE"
            [ "$PSTATE" = "Provisioned" ] && [ "$HSTATE" = "Healthy" ] && break
            if [ "$PSTATE" = "Failed" ] || [ "$HSTATE" = "Unhealthy" ]; then
              echo "Revision $NEW_REV failed — fetching logs:"
              az containerapp logs show \
                --name sb-server --resource-group sb-prod-rg \
                --revision "$NEW_REV" --tail 30 || true
              exit 1
            fi
            sleep 10
          done
          [ "$PSTATE" = "Provisioned" ] && [ "$HSTATE" = "Healthy" ] || \
            { echo "Revision $NEW_REV did not become healthy within 3 min"; exit 1; }

          # 3. Verify /healthz returns the expected SHA (catches old-revision false-green).
          FQDN=$(az containerapp show \
            --name sb-server --resource-group sb-prod-rg \
            --query "properties.configuration.ingress.fqdn" --output tsv)
          # Only check SHA when the server image was rebuilt; sidecar-only
          # deploys retain the previous server SHA by design.
          if [ "$BUILD_SERVER" = "true" ]; then
            ACTUAL_SHA=$(curl --fail --silent "https://$FQDN/healthz" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
            echo "healthz sha: $ACTUAL_SHA (expected: $SHA)"
            [ "$ACTUAL_SHA" = "$SHA" ] || \
              { echo "SHA mismatch — old revision is still serving"; exit 1; }
          else
            echo "Skipping SHA check — server image unchanged (sidecar-only deploy)"
          fi
