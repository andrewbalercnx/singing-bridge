<!doctype html>
<!--
  File: web/teacher.html
  Purpose: Teacher-side landing page. The sb:debug placeholder is
           replaced server-side with a <meta name="sb-debug"> tag
           when config.dev is true (empty string otherwise).
  Last updated: Sprint 3 (2026-04-17) -- +video tiles +controls +tier badge
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>singing-bridge — teacher</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <!-- sb:debug -->
</head>
<body>
  <main class="teacher">
    <h1 id="room-heading">Your room</h1>

    <section class="lobby">
      <h2>Lobby</h2>
      <ul id="lobby-list" aria-live="polite"></ul>
      <p id="lobby-empty">No one is waiting.</p>
    </section>

    <section class="session">
      <h2>Session</h2>
      <p class="setup-note">Please wear headphones.
        <details class="why">
          <summary>Why?</summary>
          We've turned off browser echo cancellation so your voice
          sounds natural. Headphones stop the student's voice bouncing
          back into your microphone.
        </details>
      </p>
      <p id="session-status">Waiting for a student.</p>

      <div class="tiles">
        <div class="tile remote">
          <video id="remote-video" autoplay playsinline></video>
          <audio id="remote-audio" autoplay></audio>
          <button id="unmute-audio" type="button" hidden>Click to enable audio</button>
        </div>
        <div class="tile self">
          <video id="local-video" autoplay playsinline muted></video>
        </div>
      </div>
      <div class="controls">
        <button id="mute" type="button" aria-pressed="false">Mute</button>
        <button id="video-off" type="button" aria-pressed="false">Video off</button>
        <button id="hangup" type="button">End session</button>
      </div>
    </section>

    <div id="sb-debug"></div>
    <p id="error"></p>

    <script src="/assets/browser.js"></script>
    <script src="/assets/sdp.js"></script>
    <script src="/assets/audio.js"></script>
    <script src="/assets/video.js"></script>
    <script src="/assets/debug-overlay.js"></script>
    <script src="/assets/controls.js"></script>
    <script src="/assets/signalling.js"></script>
    <script src="/assets/teacher.js"></script>
  </main>
</body>
</html>
