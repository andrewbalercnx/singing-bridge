<!doctype html>
<!--
  File: web/student.html
  Purpose: Student join form + session UI. The sb:debug placeholder
           is replaced server-side with a <meta name="sb-debug"> tag
           when config.dev is true (empty string otherwise).
  Last updated: Sprint 2 (2026-04-17) -- Sprint 2 audio + overlay
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>singing-bridge — join</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <!-- sb:debug -->
</head>
<body>
  <main class="student">
    <h1>Join your lesson</h1>
    <p class="setup-note">Please wear headphones.
      <details class="why">
        <summary>Why?</summary>
        We've turned off browser echo cancellation so your voice
        sounds natural. Headphones stop your teacher's voice bouncing
        back into your microphone.
      </details>
    </p>
    <form id="join-form">
      <label>Your email
        <input type="email" name="email" autocomplete="email" required>
      </label>
      <button type="submit">Enter lobby</button>
    </form>

    <section id="lobby-status" hidden>
      <p>Waiting to be admitted…</p>
    </section>

    <section id="session-status" hidden>
      <p>Connected.</p>
      <button id="unmute-audio" type="button" hidden>Click to enable audio</button>
      <audio id="remote-audio" autoplay playsinline></audio>
    </section>

    <div id="sb-debug"></div>
    <p id="error"></p>

    <script src="/assets/sdp.js"></script>
    <script src="/assets/audio.js"></script>
    <script src="/assets/debug-overlay.js"></script>
    <script src="/assets/signalling.js"></script>
    <script src="/assets/student.js"></script>
  </main>
</body>
</html>
