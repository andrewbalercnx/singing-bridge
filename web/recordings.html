<!doctype html>
<!--
  File: web/recordings.html
  Purpose: Teacher recording library — list, sort, send link, delete.
  Last updated: Sprint 15 (2026-04-23) -- design system migration
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>singing-bridge — recordings</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/assets/theme.css">
</head>
<body class="sb-page">
  <main class="recordings-page">
    <h1>Recordings</h1>

    <nav><a id="back-link" href="#">← Back to room</a></nav>

    <div class="sort-controls sb-row">
      <span class="sb-text-muted sb-text-sm">Sort by:</span>
      <button id="sort-date" type="button" class="sb-btn sb-btn--sm sort-active" aria-pressed="true">Date</button>
      <button id="sort-student" type="button" class="sb-btn sb-btn--ghost sb-btn--sm" aria-pressed="false">Student</button>
    </div>

    <ul id="recordings-list" aria-live="polite"></ul>
    <p id="recordings-empty" hidden>No recordings yet.</p>
    <p id="recordings-error" class="error" hidden></p>

    <!-- Send-link modal -->
    <dialog id="send-modal" class="sb-dialog">
      <form id="send-form" method="dialog">
        <h2>Send recording link</h2>
        <div class="sb-field sb-mt-4">
          <label class="sb-label" for="send-email">Recipient email</label>
          <input class="sb-input" type="email" id="send-email" autocomplete="off" required>
        </div>
        <div class="modal-actions sb-row sb-mt-4">
          <button class="sb-btn" type="submit" id="send-confirm">Send</button>
          <button class="sb-btn sb-btn--ghost" type="button" id="send-cancel">Cancel</button>
        </div>
        <p id="send-error" class="error" hidden></p>
      </form>
    </dialog>

    <script src="/assets/recordings.js"></script>
  </main>
</body>
</html>
